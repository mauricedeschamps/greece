    .back-buttons { display: flex; gap: 1rem; margin-top: 2rem; justify-content: center; flex-wrap: wrap; }
    .settings-panel { background: var(--surface); border-radius: 36px; padding: 1.8rem; margin: 1rem 0; border: 1px solid var(--border); }
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .settings-item label { font-weight: 600; display: block; margin-bottom: 0.25rem; }
    .settings-item input { width: 100%; padding: 0.6rem; border-radius: 24px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .map-container { margin: 2rem 0 1rem; border-radius: 28px; overflow: hidden; border: 2px solid var(--gold); }

    // 16 Greek sights (with Pella instead of Thessaloniki)
    const spotsData = [
      { id:"acropolis", emoji:"🏛️", officialUrl:"https://www.theacropolismuseum.gr/en", metro:{en:"Acropoli (Metro Line 2)",el:"Ακρόπολη (Μετρό Γραμμή 2)",it:"Acropoli (Metro Linea 2)",de:"Akropoli (U-Bahn Linie 2)",ru:"Акрополи (метро линия 2)",ja:"アクロポリ駅（メトロ2号线）"}, name:{en:"Acropolis & Parthenon",el:"Ακρόπολη & Παρθενώνας",it:"Acropoli & Partenone",de:"Akropolis & Parthenon",ru:"Акрополь и Парфенон",ja:"アクロポリス／パルテノン神殿"}, desc:{en:"The Acropolis is the ultimate symbol of ancient Greek civilization. The Parthenon, a Doric temple dedicated to Athena Parthenos, stands proudly on the rocky hill. From here you get a breathtaking 360° view of modern Athens and the Aegean coastline. The surrounding ancient theaters and sanctuaries make this a must-visit archaeological wonder.",el:"Η Ακρόπολη είναι το απόλυτο σύμβολο του αρχαίου ελληνικού πολιτισμού. Ο Παρθενώνας, ναός αφιερωμένος στην Αθηνά Παρθένο, δεσπόζει στον βράχο.",it:"L'Acropoli è il simbolo supremo dell'antica civiltà greca. Il Partenone domina la collina rocciosa.",de:"Die Akropolis ist das ultimative Symbol der antiken griechischen Zivilisation. Der Parthenon thront auf dem felsigen Hügel.",ru:"Акрополь — главный символ древнегреческой цивилизации. Парфенон возвышается на скалистом холме.",ja:"アクロポリスは古代ギリシャ文明の象徴。アテナを祀るパルテノン神殿がそびえる。"}, tips:{en:"Buy the combined ticket (€30) for Acropolis plus 6 other sites. Arrive at 8 AM to avoid heat & crowds. Wear sturdy shoes.",el:"Αγοράστε το συνδυαστικό εισιτήριο (€30). Φτάστε στις 8 π.μ. Παπούτσια με αντιολισθητική σόλα.",it:"Acquista il biglietto combinato (€30). Arriva alle 8:00. Scarpe comode.",de:"Kombi-Ticket (€30) kaufen. Um 8 Uhr kommen. Feste Schuhe.",ru:"Купите комбинированный билет (€30). Приходите к 8 утра. Удобная обувь.",ja:"共通券（30€）がお得。朝8時到着。歩きやすい靴で。"}},
      { id:"santorini", emoji:"🌅", officialUrl:"https://www.santorini.gr/", metro:{en:"Thira (bus from port/airport)",el:"Θήρα (λεωφορείο από λιμάνι/αεροδρόμιο)",it:"Thira (bus da porto/aeroporto)",de:"Thira (Bus vom Hafen/Flughafen)",ru:"Тира (автобус из порта/аэропорта)",ja:"ティラ（港・空港からバス）"}, name:{en:"Santorini (Oia & Fira)",el:"Σαντορίνη (Οία & Φηρά)",it:"Santorini (Oia e Fira)",de:"Santorini (Oia & Fira)",ru:"Санторини (Ойя и Фира)",ja:"サントリーニ島（イア＆フィラ）"}, desc:{en:"Santorini is the postcard of Greece: whitewashed Cycladic houses with blue domes, perched on the caldera cliff. The volcanic landscape, red and black beaches, and the famous sunset in Oia create an unforgettable romance. Explore the ancient city of Akrotiri, a Minoan Bronze Age settlement preserved in volcanic ash.",el:"Η Σαντορίνη είναι η καρτ ποστάλ της Ελλάδας: άσπρα κυκλαδίτικα σπίτια με μπλε τρούλους πάνω στην καλντέρα. Ηφαιστειακό τοπίο, κόκκινες και μαύρες παραλίες, και το περίφημο ηλιοβασίλεμα στην Οία.",it:"Santorini è la cartolina della Grecia: case bianche, cupole blu sulla caldera. Tramonto magico.",de:"Santorini ist die Postkarte Griechenlands: weiße Häuser, blaue Kuppeln auf der Caldera. Magischer Sonnenuntergang.",ru:"Санторини — открытка Греции: белые дома, синие купола на кальдере. Волшебный закат.",ja:"サントリーニはまさにギリシャのポストカード。白い壁と青いドーム、カルデラの絶景。"}, tips:{en:"Book accommodation with caldera view months in advance. Hike from Fira to Oia (3 hours) before sunset. Rent an ATV to explore beaches.",el:"Κλείστε διαμονή με θέα καλντέρα μήνες πριν. Πεζοπορία Φηρά-Οία πριν το ηλιοβασίλεμα.",it:"Prenota con vista caldera con largo anticipo. Escursione Fira-Oia. Noleggia un quad.",de:"Unterkunft mit Caldera-Blick früh buchen. Wanderung Fira-Oia. Quad mieten.",ru:"Бронируйте вид на кальдеру за месяцы. Поход из Фиры в Ойю. Арендуйте квадроцикл.",ja:"カルデラビューの宿は早めに。フィラ→イアのハイキング。ATVレンタルでビーチ巡り。"}},
      { id:"mykonos", emoji:"🌀", officialUrl:"https://www.mykonos.gr/", metro:{en:"Mykonos Town (walk from port)",el:"Χώρα Μυκόνου (με τα πόδια από λιμάνι)",it:"Città di Mykonos (a piedi dal porto)",de:"Mykonos-Stadt (zu Fuß vom Hafen)",ru:"Город Миконос (пешком из порта)",ja:"ミコノスタウン（港から徒歩）"}, name:{en:"Mykonos Town",el:"Χώρα Μυκόνου",it:"Città di Mykonos",de:"Mykonos-Stadt",ru:"Город Миконос",ja:"ミコノスタウン"}, desc:{en:"Mykonos is the cosmopolitan heart of the Cyclades. Its iconic windmills, the maze of Little Venice with bars right on the water, and glamorous beaches like Paradise and Super Paradise attract jet-setters worldwide. By day relax on golden sand, by night dance until dawn.",el:"Η Μύκονος είναι η κοσμοπολίτικη καρδιά των Κυκλάδων. Ανεμόμυλοι, Μικρή Βενετία, παραλίες Πλατύς Γιαλός, Super Paradise.",it:"Mykonos è il cuore cosmopolita delle Cicladi. Mulini, Piccola Venezia, spiagge glamour.",de:"Mykonos ist das kosmopolitische Herz der Kykladen. Windmühlen, Klein-Venedig, schicke Strände.",ru:"Миконос — космополитичное сердце Киклад. Ветряные мельницы, Маленькая Венеция, гламурные пляжи.",ja:"ミコノスはキクラデス諸島の cosmopolitan な中心地。風車、リトルベネツィア、ビーチ。"}, tips:{en:"Walk to the windmills at sunset for photos. Take a boat taxi to Paradise or Super Paradise. Book dinner in Little Venice well ahead.",el:"Περπατήστε στους ανεμόμυλους το ηλιοβασίλεμα. Βαρκάκι για Paradise/Super Paradise.",it:"Cammina verso i mulini al tramonto. Taxi boat per Paradise. Prenota cena a Little Venice.",de:"Spazieren Sie bei Sonnenuntergang zu den Windmühlen. Wassertaxi zu den Stränden.",ru:"Прогулка к ветряным мельницам на закате. Лодка-такси на пляжи.",ja:"夕暮れ時に風車へ歩く。ボートタクシーでビーチへ。リトルベネツィアの夕食は予約必須。"}},
      { id:"knossos", emoji:"🏺", officialUrl:"https://knossos-palace.gr/", metro:{en:"Heraklion (bus to Knossos)",el:"Ηράκλειο (λεωφορείο για Κνωσό)",it:"Heraklion (autobus per Cnosso)",de:"Heraklion (Bus nach Knossos)",ru:"Ираклион (автобус до Кносса)",ja:"イラクリオン（クノッソス行きバス）"}, name:{en:"Palace of Knossos",el:"Ανάκτορο Κνωσού",it:"Palazzo di Cnosso",de:"Palast von Knossos",ru:"Кносский дворец",ja:"クノッソス宮殿"}, desc:{en:"The legendary Palace of Knossos is the heart of Minoan civilization (2000–1400 BC). Associated with the myth of the Minotaur and the Labyrinth, it features colorful frescoes, advanced architecture, and the famous Throne Room. Walk through 4,000 years of European history.",el:"Το Ανάκτορο της Κνωσού είναι η καρδιά του μινωικού πολιτισμού. Συνδέεται με τον μύθο του Μινώταυρου και του Λαβύρινθου.",it:"Il Palazzo di Cnosso è il cuore della civiltà minoica. Mito del Minotauro e del Labirinto.",de:"Der Palast von Knossos ist das Herz der minoischen Zivilisation. Mythos Minotaurus.",ru:"Кносский дворец — сердце минойской цивилизации. Миф о Минотавре.",ja:"ミノア文明の中心地。ミノタウロス伝説の迷宮宮殿。"}, tips:{en:"Combine with Heraklion Archaeological Museum (same ticket). Arrive before 10 AM or after 3 PM to avoid tour groups. Hire a guide or use audio app.",el:"Συνδυάστε με το Αρχαιολογικό Μουσείο Ηρακλείου. Αποφύγετε 10-3.",it:"Abbina il Museo Archeologico. Evita le ore di punta. Guida consigliata.",de:"Kombinieren Sie mit dem Archäologischen Museum. Stoßzeiten vermeiden.",ru:"Совместите с Археологическим музеем. Избегайте толп.",ja:"イラクリオン考古学博物館と共通券。混雑避けて午前10時前または午後3時以降に。"}},
      { id:"meteora", emoji:"⛰️", officialUrl:"https://meteora.com/", metro:{en:"Kalambaka (train from Athens or Thessaloniki)",el:"Καλαμπάκα (τρένο από Αθήνα/Θεσσαλονίκη)",it:"Kalambaka (treno da Atene/Tessalonica)",de:"Kalambaka (Zug von Athen/Thessaloniki)",ru:"Каламбака (поезд из Афин/Салоников)",ja:"カランバカ（アテネまたはテッサロニキから電車）"}, name:{en:"Meteora Monasteries",el:"Μετέωρα",it:"Meteora",de:"Meteora-Klöster",ru:"Монастыри Метеоры",ja:"メテオラ修道院"}, desc:{en:"Meteora is one of Greece's most stunning landscapes: enormous sandstone pillars rising from the plain, topped by Eastern Orthodox monasteries (6 active). Built by monks in the 14th century seeking spiritual isolation, today they are a UNESCO site offering incredible views and peaceful atmosphere.",el:"Τα Μετέωρα είναι ένα από τα πιο εντυπωσιακά τοπία: γιγάντιοι βράχοι με μοναστήρια στην κορυφή. Μνημείο UNESCO.",it:"Meteora è uno dei paesaggi più spettacolari: enormi pilastri con monasteri in cima. Patrimonio UNESCO.",de:"Meteora ist eine der spektakulärsten Landschaften Griechenlands: riesige Felsen mit Klöstern. UNESCO-Welterbe.",ru:"Метеоры — один из самых впечатляющих пейзажей: гигантские скалы с монастырями на вершинах.",ja:"メテオラは巨大な岩塔の上に建つ修道院群。ユネスコ世界遺産。"}, tips:{en:"Visit 2-3 monasteries (Grand Meteoron, Varlaam, Roussanou). Dress code: knees and shoulders covered. Best light for photos is late afternoon. Stay overnight in Kalambaka.",el:"Επισκεφθείτε 2-3 μοναστήρια. Καλυμμένα γόνατα/ώμοι. Διανυκτέρευση στην Καλαμπάκα.",it:"Visita 2-3 monasteri. Spalle e ginocchia coperte. Pernottamento a Kalambaka.",de:"Besuchen Sie 2-3 Klöster. Bedeckte Knie/Schultern. Übernachtung in Kalambaka.",ru:"Посетите 2-3 монастыря. Закрытые плечи и колени. Оставайтесь в Каламбаке.",ja:"2〜3の修道院を訪問。服装注意（ひざ・肩を隠す）。カランバカに宿泊がおすすめ。"}},
      { id:"delphi", emoji:"🐍", officialUrl:"https://delphi.culture.gr/", metro:{en:"Delphi (KTEL bus from Athens Liosion station)",el:"Δελφοί (Λεωφορείο ΚΤΕΛ από Σταθμό Λιοσίων)",it:"Delfi (autobus KTEL da Atene)",de:"Delphi (KTEL-Bus von Athen)",ru:"Дельфы (автобус KTEL из Афин)",ja:"デルフィ（アテネ・リオシオン駅からKTELバス）"}, name:{en:"Delphi Archaeological Site",el:"Αρχαιολογικός Χώρος Δελφών",it:"Sito Archeologico di Delfi",de:"Archäologische Stätte Delphi",ru:"Археологический памятник Дельфы",ja:"デルフィ遺跡"}, desc:{en:"Delphi was considered the 'navel of the world' in ancient times, the most sacred oracle of Apollo. Set on the slopes of Mount Parnassus, it features the Temple of Apollo, a theater, a stadium, and the Athenian Treasury. The archaeological museum displays the famous Charioteer.",el:"Οι Δελφοί ήταν ο 'ομφαλός της γης', το ιερότερο μαντείο του Απόλλωνα. Θέα στον Παρνασσό.",it:"Delfi era l'‘ombelico del mondo’, il santuario più sacro di Apollo. Vista sul Parnaso.",de:"Delphi war der 'Nabel der Welt', das heiligste Orakel Apollons. Blick auf den Parnass.",ru:"Дельфы были 'пупом земли', священным оракулом Аполлона. Вид на Парнас.",ja:"デルフィは『世界のへそ』。アポロンの神託の地。パルナッソス山の斜面に。"}, tips:{en:"Visit the museum first (it gives context). Walk the Sacred Way up to the stadium. Bring water. Combine with a stop at Arachova village for lunch.",el:"Πρώτα το μουσείο. Ιερή Οδός έως το στάδιο. Στάση στην Αράχωβα για φαγητό.",it:"Prima il museo. Salita allo stadio. Pranzo a Arachova.",de:"Zuerst Museum. Heilige Weg bis zum Stadion. Mittagspause in Arachova.",ru:"Сначала музей. Священная дорога к стадиону. Обед в Арахове.",ja:"まず博物館を見学。聖なる道をスタジアムまで歩く。アラホバでランチ。"}},
      { id:"olympia", emoji:"🏅", officialUrl:"https://olympia.culture.gr/", metro:{en:"Ancient Olympia (bus from Pyrgos or KTEL from Athens)",el:"Αρχαία Ολυμπία (λεωφορείο από Πύργο/Αθήνα)",it:"Olimpia Antica (bus da Pyrgos)",de:"Alt-Olympia (Bus von Pyrgos)",ru:"Древняя Олимпия (автобус из Пиргоса)",ja:"オリンピア遺跡（ピルゴスからバス）"}, name:{en:"Ancient Olympia",el:"Αρχαία Ολυμπία",it:"Olimpia Antica",de:"Alt-Olympia",ru:"Древняя Олимпия",ja:"オリンピア遺跡"}, desc:{en:"Ancient Olympia is the birthplace of the Olympic Games (776 BC). Here you can see the Temple of Zeus (once housed the gold-ivory statue of Zeus, one of the Seven Wonders), the original Olympic stadium, and the workshop of Phidias. Run on the same track where athletes competed 2,800 years ago.",el:"Η Αρχαία Ολυμπία, γενέτειρα των Ολυμπιακών Αγώνων. Ναός Δία, στάδιο, εργαστήριο Φειδία.",it:"Olimpia, culla dei Giochi Olimpici. Tempio di Zeus, stadio antico.",de:"Olympia, Geburtsort der Olympischen Spiele. Zeus-Tempel, antikes Stadion.",ru:"Олимпия — родина Олимпийских игр. Храм Зевса, древний стадион.",ja:"オリンピアはオリンピック発祥の地。ゼウス神殿、古代スタジアム。"}, tips:{en:"Run or walk on the ancient track – it's a magical feeling. Visit the Archaeological Museum for the Hermes of Praxiteles. Afternoon light is beautiful for photos.",el:"Τρέξτε στο αρχαίο στάδιο. Μουσείο για Ερμή Πραξιτέλη. Απογευματινό φως.",it:"Corri sull'antica pista. Museo per l’Ermete di Prassitele. Luce pomeridiana.",de:"Auf der antiken Bahn laufen. Museum für Hermes des Praxiteles. Nachmittagslicht.",ru:"Пробегитесь по древней дорожке. Музей Гермеса Праксителя.",ja:"古代トラックを走ってみよう。プラクシテレスのヘルメス像。午後の光がベスト。"}},
      { id:"epidaurus", emoji:"🎭", officialUrl:"https://epidavros.culture.gr/", metro:{en:"Ligourio (bus from Nafplio)",el:"Λιγουριό (λεωφορείο από Ναύπλιο)",it:"Ligourio (bus da Nauplia)",de:"Ligourio (Bus von Nafplio)",ru:"Лигурио (автобус из Нафплиона)",ja:"リグリオ（ナフプリオからバス）"}, name:{en:"Theatre of Epidaurus",el:"Θέατρο Επιδαύρου",it:"Teatro di Epidauro",de:"Theater von Epidauros",ru:"Театр Эпидавра",ja:"エピダウロス劇場"}, desc:{en:"The Theatre of Epidaurus is the best-preserved ancient Greek theatre (4th century BC), famous for its perfect acoustics – a coin dropped at the center can be heard in the top row. It was part of the sanctuary of Asklepios, god of medicine. Still used for performances during the Athens-Epidaurus Festival.",el:"Το Θέατρο Επιδαύρου είναι το καλύτερα διατηρημένο αρχαίο θέατρο, με τέλεια ακουστική. Μέρος του Ασκληπιείου.",it:"Il Teatro di Epidauro è il teatro antico meglio conservato, acustica perfetta. Parte del santuario di Asclepio.",de:"Das Theater von Epidauros ist das am besten erhaltene antike Theater. Perfekte Akustik.",ru:"Театр Эпидавра — лучше всего сохранившийся древний театр, идеальная акустика.",ja:"エピダウロス劇場は古代ギリシャで最も保存状態の良い劇場。完璧な音響。"}, tips:{en:"Sit at the very top row and have a friend speak normally at the center stone. You will hear perfectly. Check the summer festival schedule – attending a play here is unforgettable.",el:"Καθίστε στην πάνω σειρά. Ελέγξτε το φεστιβάλ – μια παράσταση εδώ είναι αξέχαστη.",it:"Siediti in alto. Verifica il festival estivo – vedere uno spettacolo qui è indimenticabile.",de:"Ganz oben sitzen und zuhören. Sommerfestival besuchen – unvergesslich.",ru:"Сядьте на верхний ряд. Посетите летний фестиваль – представление здесь незабываемо.",ja:"一番上の列から中央の石の上で話す声が聞こえます。夏の音楽祭で公演を観るのがおすすめ。"}},
      { id:"rhodes", emoji:"🏰", officialUrl:"https://www.rhodes.gr/", metro:{en:"Rhodes Old Town (walk from port)",el:"Παλιά Πόλη Ρόδου (με τα πόδια από λιμάνι)",it:"Città Vecchia di Rodi (a piedi dal porto)",de:"Altstadt von Rhodos (zu Fuß vom Hafen)",ru:"Старый город Родос (пешком из порта)",ja:"ロドス旧市街（港から徒歩）"}, name:{en:"Medieval City of Rhodes",el:"Μεσαιωνική Πόλη Ρόδου",it:"Città Medievale di Rodi",de:"Mittelalterliche Stadt Rhodos",ru:"Средневековый город Родос",ja:"ロドスの中世都市"}, desc:{en:"The Medieval City of Rhodes is a UNESCO fortress built by the Knights of St. John (14th century). Encircled by massive walls, it contains the Palace of the Grand Master, the Street of the Knights, Gothic churches, and Ottoman mosques. It’s like stepping back into the Crusader era.",el:"Η Μεσαιωνική Πόλη της Ρόδου είναι ένα οχυρό των Ιωαννιτών Ιπποτών. Παλάτι Μεγάλου Μαγίστρου, Οδός Ιπποτών.",it:"La Città Medievale di Rodi è una fortezza dei Cavalieri di San Giovanni. Palazzo del Gran Maestro, Via dei Cavalieri.",de:"Die mittelalterliche Stadt Rhodos ist eine Festung der Johanniter. Großmeisterpalast, Ritterstraße.",ru:"Средневековый город Родос — крепость рыцарей-иоаннитов. Дворец великих магистров.",ja:"ロドスの中世都市は聖ヨハネ騎士団の要塞。大首長宮殿、騎士通り。"}, tips:{en:"Enter through Eleftherias Gate. Walk the entire circuit of the walls (free, guided tours in summer). Eat at a rooftop taverna in the Old Town for sunset views.",el:"Πύλη Ελευθερίας. Περίπατος στα τείχη. Ταβέρνα με θέα ηλιοβασιλέματος.",it:"Entra da Porta Eleftherias. Giro sulle mura. Taverna con vista tramonto.",de:"Durch das Eleftherias-Tor eintreten. Mauerrundgang. Taverne mit Sonnenuntergangsblick.",ru:"Войдите через ворота Элефтериас. Прогулка по стенам. Таверна с видом на закат.",ja:"エレフテリアス門から入場。城壁の遊歩道を歩く。旧市街の屋上タベルナで夕日を。"}},
      { id:"corfu", emoji:"🏯", officialUrl:"https://www.corfu.gr/", metro:{en:"Corfu Town (walk from port)",el:"Κέρκυρα (με τα πόδια από λιμάνι)",it:"Città di Corfù (a piedi dal porto)",de:"Korfu-Stadt (zu Fuß vom Hafen)",ru:"Город Керкира (пешком из порта)",ja:"ケルキラ旧市街（港から徒歩）"}, name:{en:"Corfu Old Town",el:"Παλιά Πόλη Κέρκυρας",it:"Città Vecchia di Corfù",de:"Altstadt von Korfu",ru:"Старый город Керкира",ja:"ケルキラ旧市街"}, desc:{en:"Corfu's Old Town blends Venetian, French, English and Greek architecture, a UNESCO gem. The two fortresses (Old and New) guard the city. Explore narrow cobbled streets called 'kantounia', the Liston arcade (French-style café strip), and the Spianada square – the largest in the Balkans.",el:"Η Παλιά Πόλη της Κέρκυρας συνδυάζει βενετική, γαλλική, αγγλική και ελληνική αρχιτεκτονική. Δύο φρούρια, Λιστόν, Σπιανάδα.",it:"La Città Vecchia di Corfù mescola architetture veneziane, francesi, inglesi. Due fortezze, Liston, Spianada.",de:"Die Altstadt von Korfu vereint venezianische, französische, englische Architektur. Zwei Festungen.",ru:"Старый город Керкиры сочетает венецианскую, французскую, английскую архитектуру. Две крепости.",ja:"ケルキラ旧市街はベネチア・フランス・イギリスの建築が融合。二つの要塞。"}, tips:{en:"Climb the Old Fortress just before sunset for a panoramic view. Taste local kumquat liqueur and pastitsada (beef stew). Take a day trip to Paleokastritsa beach.",el:"Ανεβείτε στο Παλαιό Φρούριο πριν το ηλιοβασίλεμα. Δοκιμάστε κουμκουάτ και παστιτσάδα.",it:"Sali alla Fortezza Vecchia al tramonto. Assaggia kumquat e pastitsada.",de:"Alte Festung vor Sonnenuntergang besteigen. Kumquat-Likör und Pastitsada probieren.",ru:"Поднимитесь в Старую крепость перед закатом. Попробуйте ликер кумкват и паститсада.",ja:"夕日の前に旧要塞へ登る。クムクアットリキュールとパスティツァーダ（ビーフシチュー）を。"}},
      { id:"zakynthos", emoji:"🚤", officialUrl:"https://www.zakynthos.gr/", metro:{en:"Zakynthos Town (boat tour to Navagio)",el:"Ζάκυνθος (βάρκα για Ναυάγιο)",it:"Zakynthos (barca per Navagio)",de:"Zakynthos (Boot nach Navagio)",ru:"Закинтос (лодка до Навагио)",ja:"ザキントス（ナバジオへボート）"}, name:{en:"Navagio (Shipwreck) Beach",el:"Ναυάγιο",it:"Spiaggia del Relitto",de:"Navagio (Wrackbucht)",ru:"Пляж Навагио (Кораблекрушение)",ja:"ナバジオ（沈没船）ビーチ"}, desc:{en:"Navagio Beach, also known as Shipwreck Beach, is the most photographed beach in Greece. A rusty smuggler's shipwreck rests on white sand, surrounded by turquoise water and dramatic limestone cliffs. Accessible only by boat, the cove also offers a breathtaking viewpoint from above.",el:"Το Ναυάγιο είναι η πιο φημισμένη παραλία της Ελλάδας. Βυθισμένο πλοίο, λευκή άμμος, γαλαζοπράσινα νερά. Θέα από ψηλά.",it:"Navagio è la spiaggia più fotografata della Grecia. Relitto, sabbia bianca, acqua turchese. Vista dall'alto.",de:"Navagio ist der meistfotografierte Strand Griechenlands. Wrack, weißer Sand, türkisfarbenes Wasser.",ru:"Навагио — самый фотографируемый пляж Греции. Кораблекрушение, белый песок, бирюзовая вода.",ja:"ナバジオはギリシャで最も写真に撮られるビーチ。難破船、白い砂、トルコ石の海。"}, tips:{en:"The viewpoint on the cliff above is free (park at the top). Boat tours leave from Porto Vromi or Agios Nikolaos. Go early morning for fewer crowds. Water shoes recommended.",el:"Θέα από πάνω δωρεάν. Βάρκες από Πόρτο Βρόμη. Νωρίς το πρωί. Παπούτσια για βράχια.",it:"Vista dall'alto gratuita. Barche da Porto Vromi. Mattina presto. Scarpe da scoglio.",de:"Aussicht von oben kostenlos. Boote ab Porto Vromi. Früher Morgen. Wasserschuhe.",ru:"Смотровая площадка сверху бесплатна. Лодки от Порто Вроми. Рано утром. Обувь для скал.",ja:"断崖上の展望台は無料。ポルト・ブロミからボート。早朝がおすすめ。ウォーターシューズを。"}},
      { id:"pella", emoji:"⚜️", officialUrl:"https://www.pella-museum.gr/", metro:{en:"Pella (bus from Thessaloniki or Edessa)",el:"Πέλλα (λεωφορείο από Θεσσαλονίκη/Έδεσσα)",it:"Pella (bus da Salonicco o Edessa)",de:"Pella (Bus von Thessaloniki oder Edessa)",ru:"Пелла (автобус из Салоников или Эдессы)",ja:"ペラ（テッサロニキまたはエデッサからバス）"}, name:{en:"Pella (Ancient Macedonian Capital)",el:"Πέλλα (Πρωτεύουσα της Μακεδονίας)",it:"Pella (Capitale dell'antica Macedonia)",de:"Pella (Hauptstadt Makedoniens)",ru:"Пелла (Столица древней Македонии)",ja:"ペラ（古代マケドニアの都）"}, desc:{en:"Pella was the magnificent capital of ancient Macedonia and birthplace of Alexander the Great. Excavations have revealed a grand palace, private houses with exquisite pebble mosaic floors (including the famous 'Lion Hunt' scene), and an agora. The on-site museum displays artifacts from the Macedonian court and the tomb of Alexander’s father, Philip II.",el:"Η Πέλλα ήταν η λαμπρή πρωτεύουσα της αρχαίας Μακεδονίας, γενέτειρα του Μεγάλου Αλεξάνδρου. Ανάκτορο, ψηφιδωτά, μουσείο.",it:"Pella fu la magnifica capitale dell'antica Macedonia, luogo di nascita di Alessandro Magno. Mosaici, museo.",de:"Pella war die prächtige Hauptstadt Makedoniens, Geburtsort Alexanders des Großen. Mosaike, Museum.",ru:"Пелла была великолепной столицей древней Македонии, родиной Александра Македонского. Мозаики.",ja:"ペラはアレクサンドロス大王の生誕地、古代マケドニアの壮麗な都。モザイク画の床が圧巻。"}, tips:{en:"Combine with a visit to Vergina (tomb of Philip II) – they are 45 minutes apart. The pebble mosaics are original, do not touch. Buy combined ticket for archaeological site + museum (€8). Try local wine and fruits from the plain.",el:"Συνδυάστε με Βεργίνα (τάφος Φιλίππου Β'). Συνδυαστικό εισιτήριο. Τοπικό κρασί και φρούτα.",it:"Abbina a Vergina (tomba di Filippo II). Biglietto combinato. Vino locale.",de:"Kombinieren Sie mit Vergina (Grab Philipps II.). Kombi-Ticket. Lokaler Wein.",ru:"Совместите с Вергиной (гробница Филиппа II). Комбинированный билет. Местное вино.",ja:"ヴェルギナ（ピリッポス2世の墓）とセットで。共通券（8€）を利用。平地のワインと果物を味わう。"}},
      { id:"nafplio", emoji:"🏯", officialUrl:"https://www.nafplio.gr/", metro:{en:"Nafplio (bus from Athens)",el:"Ναύπλιο (λεωφορείο από Αθήνα)",it:"Nauplia (bus da Atene)",de:"Nafplio (Bus von Athen)",ru:"Нафплион (автобус из Афин)",ja:"ナフプリオ（アテネからバス）"}, name:{en:"Palamidi Fortress",el:"Παλαμήδι",it:"Fortezza di Palamidi",de:"Festung Palamidi",ru:"Крепость Паламиди",ja:"パラミディ要塞"}, desc:{en:"Palamidi is a dramatic Venetian fortress perched 216 meters above Nafplio. Built between 1711–1714, it consists of 8 bastions connected by stone steps. The famous 999-step staircase leads up from the town (but you can also drive). The view over the Argolic Gulf, Bourtzi island, and the red-tiled roofs of Nafplio is simply breathtaking.",el:"Το Παλαμήδι είναι ένα εντυπωσιακό ενετικό φρούριο πάνω από το Ναύπλιο. 999 σκαλοπάτια, πανοραμική θέα.",it:"Palamidi è una drammatica fortezza veneziana sopra Nauplia. 999 gradini, vista mozzafiato.",de:"Palamidi ist eine dramatische venezianische Festung oberhalb von Nafplio. 999 Stufen, atemberaubende Aussicht.",ru:"Паламиди — впечатляющая венецианская крепость над Нафплионом. 999 ступеней.",ja:"パラミディ要塞はナフプリオを見下ろすベネチアの要塞。999段の階段、絶景。"}, tips:{en:"You can drive to the top (parking fee). The 999 steps are a challenge but rewarding – start early morning. Combine with a visit to Bourtzi fortress on the islet (water taxi). Enjoy fresh seafood at Nafplio’s harbor.",el:"Μπορείτε να οδηγήσετε στην κορυφή. Τα 999 σκαλιά αξίζουν. Συνδυάστε με Μπούρτζι. Θαλασσινά στο λιμάνι.",it:"Si può arrivare in auto. I 999 scalini sono una sfida. Abbina a Bourtzi. Pesce fresco.",de:"Mit dem Auto zum Gipfel. Die 999 Stufen lohnen sich. Kombiniere mit Bourtzi. Frischer Fisch.",ru:"Можно подъехать на машине. 999 ступеней — вызов. Совместите с Бурдзи. Свежая рыба.",ja:"車で頂上まで行けます。999段の階段に挑戦するなら早朝に。沖のブルツィ島（水上タクシー）とセットで。港でシーフード。"}},
      { id:"sounion", emoji:"🌊", officialUrl:"https://www.sounion.gr/", metro:{en:"Sounion (bus from Athens KTEL)",el:"Σούνιο (λεωφορείο ΚΤΕΛ από Αθήνα)",it:"Sounio (bus KTEL da Atene)",de:"Sounion (KTEL-Bus von Athen)",ru:"Сунион (автобус KTEL из Афин)",ja:"スニオ岬（アテネからKTELバス）"}, name:{en:"Temple of Poseidon",el:"Ναός του Ποσειδώνα",it:"Tempio di Poseidone",de:"Tempel des Poseidon",ru:"Храм Посейдона",ja:"ポセイドン神殿"}, desc:{en:"At the southernmost tip of Attica, the Temple of Poseidon (444 BC) stands on a cliff 65 meters above the Aegean Sea. The Doric columns glow golden at sunset. Legend says that King Aegeus threw himself from these cliffs when he mistakenly thought his son Theseus had died – giving the Aegean Sea its name.",el:"Στο νοτιότερο άκρο της Αττικής, ο Ναός του Ποσειδώνα σε γκρεμό 65μ πάνω από το Αιγαίο. Ιωνικός ρυθμός, ηλιοβασίλεμα.",it:"All'estremità meridionale dell'Attica, il Tempio di Poseidone su una scogliera. Tramonto dorato.",de:"Am südlichsten Zipfel Attikas, der Tempel des Poseidon auf einer Klippe. Goldener Sonnenuntergang.",ru:"На южной оконечности Аттики, храм Посейдона на скале. Золотой закат.",ja:"アッティカ半島最南端、断崖の上に立つポセイドン神殿。黄金の夕日。"}, tips:{en:"Sunset is magical but crowded – arrive 1 hour before. Bring a jacket as it gets windy. Combine with a coastal drive from Athens along the Athens Riviera. Nearby Sounio beach is good for a swim.",el:"Ηλιοβασίλεμα μαγικό αλλά πολύς κόσμος. Φτάστε 1 ώρα πριν. Αεράκι. Οδήγηση παραλιακά.",it:"Tramonto magico ma affollato. Arriva 1 ora prima. Giacca. Guida costiera.",de:"Sonnenuntergang magisch aber überfüllt. 1 Stunde vorher da sein. Jacke. Küstenfahrt.",ru:"Закат волшебный, но многолюдно. Приходите за час. Куртка. Прибрежная дорога.",ja:"夕日は混雑。1時間前に到着。防寒着必須。アテネ・リビエラの海岸ドライブをどうぞ。"}},
      { id:"delos", emoji:"🗿", officialUrl:"https://delos.culture.gr/", metro:{en:"Delos (boat from Mykonos old port)",el:"Δήλος (βάρκα από παλιό λιμάνι Μυκόνου)",it:"Delo (barca dal vecchio porto di Mykonos)",de:"Delos (Boot vom alten Hafen Mykonos)",ru:"Делос (лодка из старого порта Миконоса)",ja:"デロス島（ミコノス旧港から船）"}, name:{en:"Delos Archaeological Site",el:"Αρχαιολογικός Χώρος Δήλου",it:"Sito Archeologico di Delo",de:"Archäologische Stätte Delos",ru:"Археологический памятник Делос",ja:"デロス遺跡"}, desc:{en:"Delos is one of the most important mythological, historical and archaeological sites in Greece. According to legend, the island is the birthplace of Apollo and Artemis. The entire island is an open-air museum: Terrace of the Lions, House of the Dolphins, Temple of Apollo, and a sacred lake. No one is allowed to stay overnight; it's a pure day-trip.",el:"Η Δήλος είναι γενέτειρα του Απόλλωνα και της Αρτέμιδας. Υπαίθριο μουσείο: Λεόντων, Δελφίνων, λίμνη.",it:"Delo è la mitologica isola natale di Apollo e Artemide. Museo all'aperto: Terrazza dei Leoni.",de:"Delos ist die mythologische Geburtsinsel von Apollon und Artemis. Freilichtmuseum.",ru:"Делос — мифический остров рождения Аполлона и Артемиды. Музей под открытым небом.",ja:"デロス島はアポロンとアルテミス生誕の聖島。野外博物館。ライオンのテラス。"}, tips:{en:"Wear a hat, sunscreen, and bring at least 1.5L of water – no shade. Only boats from Mykonos (approx €20 round trip). Check return times. The museum is a must-see for the Kouros statues.",el:"Καπέλο, αντιηλιακό, πολύ νερό. Μόνο βάρκες από Μύκονο. Μουσείο υποχρεωτικό.",it:"Cappello, crema solare, acqua. Solo barche da Mykonos. Museo da non perdere.",de:"Hut, Sonnencreme, viel Wasser. Nur Boote ab Mykonos. Museum ein Muss.",ru:"Шляпа, крем, много воды. Только лодки с Миконоса. Музей обязателен.",ja:"帽子、日焼け止め、水1.5L必須（日陰なし）。ミコノスからの船のみ。クーロス像の博物館も必見。"}},
      { id:"corinth", emoji:"🏺", officialUrl:"https://corinth.culture.gr/", metro:{en:"Ancient Corinth (bus from Athens or train to Corinth)",el:"Αρχαία Κόρινθος (λεωφορείο από Αθήνα ή τρένο)",it:"Corinto Antica (bus da Atene)",de:"Alt-Korinth (Bus von Athen)",ru:"Древний Коринф (автобус из Афин)",ja:"古代コリントス（アテネからバス）"}, name:{en:"Ancient Corinth & Acrocorinth",el:"Αρχαία Κόρινθος & Ακροκόρινθος",it:"Corinto Antica e Acrocorinto",de:"Alt-Korinth & Akrokorinth",ru:"Древний Коринф и Акрокоринф",ja:"古代コリントス／アクロコリントス"}, desc:{en:"Ancient Corinth was one of the wealthiest city-states of Greece, controlling the Isthmus connecting Peloponnese to mainland. The Doric Temple of Apollo (6th century BC) dominates the site. Above looms the fortress of Acrocorinth, one of the largest and best-preserved castles in Greece, with walls from Byzantine, Frankish, and Ottoman eras. The views from the top are immense.",el:"Η Αρχαία Κόρινθος ήταν πλούσια πόλος-κράτος. Ναός Απόλλωνα, και πάνω το Ακροκόρινθος, τεράστιο κάστρο.",it:"Corinto era una ricca città-stato. Tempio di Apollo, e sopra l'Acrocorinto, enorme castello.",de:"Alt-Korinth war eine reiche Stadt. Apollontempel, und oben Akrokorinth, riesige Burg.",ru:"Древний Коринф был богатым городом-государством. Храм Аполлона и Акрокоринф — огромная крепость.",ja:"古代コリントスは裕福な都市国家。アポロン神殿と、その上に広がるアクロコリントスの巨大要塞。"}, tips:{en:"Climb Acrocorinth (free, great hike) for the most spectacular views. The site museum holds fascinating artifacts. Combine with the Corinth Canal (5 min away) where you can see ships crossing the narrow cut.",el:"Ανεβείτε στο Ακροκόρινθος. Μουσείο. Κανάλι της Κορίνθου για πλοία.",it:"Sali su Acrocorinto (gratis). Museo. Canale di Corinto vicino.",de:"Akrokorinth besteigen (kostenlos). Museum. Kanal von Korinth.",ru:"Поднимитесь на Акрокоринф (бесплатно). Музей. Коринфский канал рядом.",ja:"アクロコリントスへ登る（無料）。博物館も。近くのコリントス運河で船が通る様子を。"}}
    ];

    let customImages = JSON.parse(localStorage.getItem('greece_custom_images')) || {};
    const SORT_ORDER_KEY = 'greece_sort_order';
    let currentSortOrder = null;
    let sortableInstance = null;

    function getImageForSpot(id) { return customImages[id] || null; }

    function loadSortOrder() {
      const stored = localStorage.getItem(SORT_ORDER_KEY);
      if (stored) {
        try {
          currentSortOrder = JSON.parse(stored);
          if (!Array.isArray(currentSortOrder)) currentSortOrder = null;
        } catch(e) { currentSortOrder = null; }
      } else {
        currentSortOrder = null;
      }
    }

    function saveSortOrder(orderArray) {
      if (orderArray && orderArray.length === spotsData.length) {
        localStorage.setItem(SORT_ORDER_KEY, JSON.stringify(orderArray));
        currentSortOrder = orderArray;
      }
    }

    function getSortedSpots() {
      if (!currentSortOrder) return [...spotsData];
      const sorted = [];
      const map = new Map(spotsData.map(s => [s.id, s]));
      for (const id of currentSortOrder) {
        if (map.has(id)) {
          sorted.push(map.get(id));
          map.delete(id);
        }
      }
      sorted.push(...map.values());
      return sorted;
    }

    function renderHome() {
      const container = document.getElementById('spot-slider');
      container.innerHTML = '';
      const sortedSpots = getSortedSpots();
      sortedSpots.forEach(spot => {
        const card = document.createElement('div'); 
        card.className = 'spot-card';
        card.setAttribute('data-id', spot.id);
        
        const handleDiv = document.createElement('div');
        handleDiv.className = 'drag-handle';
        handleDiv.innerHTML = '⋮⋮';
        handleDiv.setAttribute('aria-label', 'Drag to reorder');
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'card-content';
        
        const name = spot.name[currentLang] || spot.name.en;
        const desc = (spot.desc[currentLang] || spot.desc.en).substring(0, 90) + '…';
        const imgUrl = getImageForSpot(spot.id);
        const imgHtml = imgUrl ? `<img class="spot-img" src="${imgUrl}" alt="${name}" loading="lazy">` : `<div class="spot-emoji">${spot.emoji}</div>`;
        contentDiv.innerHTML = `${imgHtml}<div class="spot-name">${name}</div><div class="spot-desc">${desc}</div>`;
        
        card.appendChild(handleDiv);
        card.appendChild(contentDiv);
        
        card.addEventListener('click', (e) => {
          if (handleDiv.contains(e.target)) return;
          showDetailView(spot.id);
        });
        
        container.appendChild(card);
      });
      initSortable();
    }

    function initSortable() {
      const container = document.getElementById('spot-slider');
      if (!container) return;
      if (sortableInstance) {
        sortableInstance.destroy();
        sortableInstance = null;
      }
      sortableInstance = new Sortable(container, {
        handle: '.drag-handle',
        animation: 250,
        ghostClass: 'sortable-drag',
        onEnd: function() {
          const newOrder = [];
          const cards = container.querySelectorAll('.spot-card');
          cards.forEach(card => {
            const id = card.getAttribute('data-id');
            if (id) newOrder.push(id);
          });
          if (newOrder.length === spotsData.length) {
            saveSortOrder(newOrder);
          }
        }
      });
    }

    function updateUI() {
      const tr = t[currentLang];
      document.getElementById('app-title').innerText = tr.title;
      document.getElementById('settings-btn-text').innerText = tr.settingsBtn;
      document.getElementById('theme-toggle-text').innerText = tr.themeBtn;
      document.getElementById('save-settings-text').innerText = tr.saveSettings;
      document.getElementById('close-settings-text').innerText = tr.back;
      document.getElementById('settings-title').innerText = tr.settingsTitle;
      document.getElementById('settings-desc').innerText = tr.settingsDesc;
      document.getElementById('footer-text').innerHTML = `${tr.footerText}<br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a>`;
      renderHome();
      const curId = document.getElementById('detail-view').getAttribute('data-spot-id');
      if (!document.getElementById('home-view').classList.contains('hidden') && curId) showDetailView(curId);
    }

    function showDetailView(id) {
      const spot = spotsData.find(s => s.id === id);
      if (!spot) return;
      const tr = t[currentLang];
      const name = spot.name[currentLang] || spot.name.en;
      const desc = spot.desc[currentLang] || spot.desc.en;
      const tips = spot.tips[currentLang] || spot.tips.en;
      const metro = spot.metro[currentLang] || spot.metro.en;
      const imgUrl = getImageForSpot(spot.id);
      const imgHtml = imgUrl ? `<img class="detail-img" src="${imgUrl}" alt="${name}">` : `<div style="font-size:5rem">${spot.emoji}</div>`;
      const html = `
        <div class="detail-header">${imgHtml}<div class="detail-title">${name}</div></div>
        <div class="detail-description">${desc}</div>
        <div class="tips-card"><strong>${tr.tipsLabel}</strong><br>${tips}</div>
        <div class="metro-info">${tr.metroLabel}: ${metro}</div><br>
        <a href="${spot.officialUrl}" target="_blank" class="official-link">${tr.officialLabel}</a>
        <div class="back-buttons"><button class="back-btn" id="back-to-home">🏠 ${tr.home}</button><button class="back-btn" id="back-previous">◀ ${tr.back}</button></div>
      `;
      const detailDiv = document.getElementById('detail-view');
      detailDiv.innerHTML = html; detailDiv.setAttribute('data-spot-id', id);
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('settings-view').classList.add('hidden');
      detailDiv.classList.remove('hidden');
      document.getElementById('back-to-home')?.addEventListener('click', () => showHomeView());
      document.getElementById('back-previous')?.addEventListener('click', () => window.history.back());
      window.history.pushState({ view: 'detail', id }, '', `#${id}`);
    }

    function showHomeView() {
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('settings-view').classList.add('hidden');
      document.getElementById('home-view').classList.remove('hidden');
      window.history.pushState({ view: 'home' }, '', '#home');
      renderHome();
    }

    function openSettings() {
      const grid = document.getElementById('settings-grid');
      grid.innerHTML = '';
      spotsData.forEach(spot => {
        const div = document.createElement('div'); div.className = 'settings-item';
        div.innerHTML = `<label>${spot.emoji} ${spot.name.en}</label><input type="text" id="img_${spot.id}" placeholder="https://..." value="${customImages[spot.id] || ''}">`;
        grid.appendChild(div);
      });
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('settings-view').classList.remove('hidden');
    }

    function saveSettings() {
      spotsData.forEach(spot => {
        const input = document.getElementById(`img_${spot.id}`);
        if (input && input.value.trim()) customImages[spot.id] = input.value.trim();
        else delete customImages[spot.id];
      });
      localStorage.setItem('greece_custom_images', JSON.stringify(customImages));
      renderHome();
      const curId = document.getElementById('detail-view').getAttribute('data-spot-id');
      if (curId && !document.getElementById('detail-view').classList.contains('hidden')) showDetailView(curId);
      alert(t[currentLang].saveSettings);
      showHomeView();
    }

    function initLangButtons() {
      const container = document.getElementById('lang-buttons');
      container.innerHTML = '';
      for (let [code, label] of Object.entries(languages)) {
        const btn = document.createElement('button'); btn.className = 'lang-btn';
        btn.innerHTML = label;
        btn.onclick = () => { currentLang = code; updateUI(); };
        container.appendChild(btn);
      }
    }

    function initTheme() {
      const stored = localStorage.getItem('theme');
      if (stored === 'light') { document.body.classList.remove('dark'); document.body.classList.add('light'); }
      else { document.body.classList.add('dark'); document.body.classList.remove('light'); }
      document.getElementById('theme-toggle').onclick = () => {
        const isDark = document.body.classList.contains('dark');
        if (isDark) { document.body.classList.replace('dark', 'light'); localStorage.setItem('theme', 'light'); }
        else { document.body.classList.replace('light', 'dark'); localStorage.setItem('theme', 'dark'); }
      };
    }

    function route() {
      const hash = window.location.hash.slice(1);
      if (hash && hash !== 'home' && spotsData.some(s => s.id === hash)) showDetailView(hash);
      else showHomeView();
    }

    window.addEventListener('popstate', () => {
      if (!document.getElementById('home-view').classList.contains('hidden')) {
        const id = window.location.hash.slice(1);
        if (id && spotsData.some(s=>s.id===id)) showDetailView(id);
        else showHomeView();
      } else { if (window.location.hash === '#home') showHomeView(); else route(); }
    });

    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW error', e)));
    
    loadSortOrder();
    initLangButtons(); 
    initTheme(); 
    renderHome(); 
    route();
    
    document.getElementById('settings-btn')?.addEventListener('click', openSettings);
    document.getElementById('save-settings')?.addEventListener('click', saveSettings);
    document.getElementById('close-settings')?.addEventListener('click', showHomeView);
  </script>
</body>
</html>
