      { id:"nafplio", emoji:"🏯", officialUrl:"https://www.nafplio.gr/", metro:{en:"Nafplio (bus from Athens)",el:"Ναύπλιο (λεωφορείο)",it:"Nauplia (bus da Atene)",de:"Nafplio (Bus von Athen)",ru:"Нафплион (автобус из Афин)",ja:"ナフプリオ（アテネからバス）"}, name:{en:"Palamidi Fortress",el:"Παλαμήδι",it:"Fortezza di Palamidi",de:"Festung Palamidi",ru:"Крепость Паламиди",ja:"パラミディ要塞"}, desc:{en:"Venetian fortress with 999 steps, stunning view over Argolic Gulf.",el:"Ενετικό φρούριο με 999 σκαλοπάτια, θέα Αργολικού κόλπου.",it:"Fortezza veneziana con 999 scalini, vista golfo Argolico.",de:"Venezianische Festung mit 999 Stufen, Blick auf Argolischen Golf.",ru:"Венецианская крепость с 999 ступенями.",ja:"999段の階段を持つベネチア要塞。アルゴリス湾の絶景。"}, tips:{en:"Climb stairs or taxi up. Combine with Bourtzi castle.",el:"Ανεβείτε με ταξί ή σκάλες. Συνδυάστε με Μπούρτζι.",it:"Sali le scale o taxi. Abbinata a Bourtzi.",de:"Treppen oder Taxi. Kombiniere mit Burg Bourtzi.",ru:"Поднимитесь по лестнице или такси. Совместите с Бурдзи.",ja:"階段かタクシーで。沖のブルツィ島も。"}},

      { id:"delos", emoji:"🗿", officialUrl:"https://delos.culture.gr/", metro:{en:"Delos (boat from Mykonos)",el:"Δήλος (βάρκα από Μύκονο)",it:"Delo (barca da Mykonos)",de:"Delos (Boot von Mykonos)",ru:"Делос (лодка с Миконоса)",ja:"デロス島（ミコノスから船）"}, name:{en:"Delos Archaeological Site",el:"Αρχαιολογικός Χώρος Δήλου",it:"Sito Archeologico di Delo",de:"Archäologische Stätte Delos",ru:"Археологический памятник Делос",ja:"デロス遺跡"}, desc:{en:"Sacred island, birthplace of Apollo, vast ruins, Terrace of Lions.",el:"Ιερό νησί, γενέτειρα Απόλλωνα, τεράστια ερείπια.",it:"Isola sacra, nascita di Apollo, rovine, Terrazza dei Leoni.",de:"Heilige Insel, Geburtsort Apollons, Löwenterrassen.",ru:"Священный остров, место рождения Аполлона.",ja:"アポロン生誕の聖島。ライオンのテラス。"}, tips:{en:"Half-day trip. Wear sunhat, bring water.",el:"Ημερήσια εκδρομή. Καπέλο, νερό.",it:"Gita di mezza giornata. Cappello, acqua.",de:"Halbtagesausflug. Sonnenhut, Wasser.",ru:"Экскурсия на полдня. Шляпа, вода.",ja:"半日ツアー。帽子と水必須。"}},
      { id:"corinth", emoji:"🏺", officialUrl:"https://corinth.culture.gr/", metro:{en:"Ancient Corinth (bus from Athens)",el:"Αρχαία Κόρινθος (λεωφορείο)",it:"Corinto Antica (bus)",de:"Alt-Korinth (Bus)",ru:"Древний Коринф (автобус)",ja:"古代コリントス（バス）"}, name:{en:"Ancient Corinth",el:"Αρχαία Κόρινθος",it:"Corinto Antica",de:"Alt-Korinth",ru:"Древний Коринф",ja:"古代コリントス"}, desc:{en:"Rich commercial city, Temple of Apollo, Acrocorinth fortress.",el:"Πλούσια εμπορική πόλη, Ναός Απόλλωνα, Ακροκόρινθος.",it:"Ricca città commerciale, Tempio di Apollo, Acrocorinto.",de:"Reiche Handelsstadt, Apollontempel, Akrokorinth.",ru:"Богатый торговый город, храм Аполлона.",ja:"裕福な商業都市。アポロン神殿とアクロコリントス。"}, tips:{en:"Climb Acrocorinth for amazing views. Visit museum.",el:"Ανεβείτε Ακροκόρινθο. Επισκεφθείτε μουσείο.",it:"Sali su Acrocorinto. Visita il museo.",de:"Akrokorinth besteigen. Museum besuchen.",ru:"Поднимитесь на Акрокоринф. Посетите музей.",ja:"アクロコリントスへ登る。博物館も。"}}
    ];

    let customImages = JSON.parse(localStorage.getItem('greece_custom_images')) || {};
    function getImageForSpot(id) { return customImages[id] || null; }
    function updateUI() {
      const tr = t[currentLang];
      document.getElementById('app-title').innerText = tr.title;
      document.getElementById('settings-btn-text').innerText = tr.settingsBtn;
      document.getElementById('theme-toggle-text').innerText = tr.themeBtn;
      document.getElementById('save-settings-text').innerText = tr.saveSettings;
      document.getElementById('close-settings-text').innerText = tr.back;
      document.getElementById('settings-title').innerText = tr.settingsTitle;
      document.getElementById('settings-desc').innerText = tr.settingsDesc;
      document.getElementById('footer-text').innerHTML = `${tr.footerText}<br><a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a>`;
      renderHome();
      const curId = document.getElementById('detail-view').getAttribute('data-spot-id');
      if (!document.getElementById('home-view').classList.contains('hidden') && curId) showDetailView(curId);
    }
    function renderHome() {
      const container = document.getElementById('spot-slider');
      container.innerHTML = '';
      spotsData.forEach(spot => {
        const card = document.createElement('div'); card.className = 'spot-card';
        const name = spot.name[currentLang] || spot.name.en;
        const desc = (spot.desc[currentLang] || spot.desc.en).substring(0, 80);
        const imgUrl = getImageForSpot(spot.id);
        const imgHtml = imgUrl ? `<img class="spot-img" src="${imgUrl}" alt="${name}" loading="lazy">` : `<div class="spot-emoji">${spot.emoji}</div>`;
        card.innerHTML = `${imgHtml}<div class="spot-name">${name}</div><div class="spot-desc">${desc}...</div>`;
        card.onclick = () => showDetailView(spot.id);
        container.appendChild(card);
      });
    }
    function showDetailView(id) {
      const spot = spotsData.find(s => s.id === id);
      if (!spot) return;
      const tr = t[currentLang];
      const name = spot.name[currentLang] || spot.name.en;
      const desc = spot.desc[currentLang] || spot.desc.en;
      const tips = spot.tips[currentLang] || spot.tips.en;
      const metro = spot.metro[currentLang] || spot.metro.en;
      const imgUrl = getImageForSpot(spot.id);
      const imgHtml = imgUrl ? `<img class="detail-img" src="${imgUrl}" alt="${name}">` : `<div style="font-size:5rem">${spot.emoji}</div>`;
      const html = `
        <div class="detail-header">${imgHtml}<div class="detail-title">${name}</div></div>
        <div class="detail-description">${desc}</div>
        <div class="tips-card"><strong>${tr.tipsLabel}</strong><br>${tips}</div>
        <div class="metro-info">${tr.metroLabel}: ${metro}</div><br>
        <a href="${spot.officialUrl}" target="_blank" class="official-link">${tr.officialLabel}</a>
        <div class="back-buttons"><button class="back-btn" id="back-to-home">🏠 ${tr.home}</button><button class="back-btn" id="back-previous">◀ ${tr.back}</button></div>
      `;
      const detailDiv = document.getElementById('detail-view');
      detailDiv.innerHTML = html; detailDiv.setAttribute('data-spot-id', id);
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('settings-view').classList.add('hidden');
      detailDiv.classList.remove('hidden');
      document.getElementById('back-to-home')?.addEventListener('click', () => showHomeView());
      document.getElementById('back-previous')?.addEventListener('click', () => window.history.back());
      window.history.pushState({ view: 'detail', id }, '', `#${id}`);
    }
    function showHomeView() {
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('settings-view').classList.add('hidden');
      document.getElementById('home-view').classList.remove('hidden');
      window.history.pushState({ view: 'home' }, '', '#home');
      renderHome();
    }
    function openSettings() {
      const grid = document.getElementById('settings-grid');
      grid.innerHTML = '';
      spotsData.forEach(spot => {
        const div = document.createElement('div'); div.className = 'settings-item';
        div.innerHTML = `<label>${spot.emoji} ${spot.name.en}</label><input type="text" id="img_${spot.id}" placeholder="https://..." value="${customImages[spot.id] || ''}">`;
        grid.appendChild(div);
      });
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('settings-view').classList.remove('hidden');
    }
    function saveSettings() {
      spotsData.forEach(spot => {
        const input = document.getElementById(`img_${spot.id}`);
        if (input && input.value.trim()) customImages[spot.id] = input.value.trim();
        else delete customImages[spot.id];
      });
      localStorage.setItem('greece_custom_images', JSON.stringify(customImages));
      renderHome();
      const curId = document.getElementById('detail-view').getAttribute('data-spot-id');
      if (curId && !document.getElementById('detail-view').classList.contains('hidden')) showDetailView(curId);
      alert(t[currentLang].saveSettings);
      showHomeView();
    }
    function initLangButtons() {
      const container = document.getElementById('lang-buttons');
      container.innerHTML = '';
      for (let [code, label] of Object.entries(languages)) {
        const btn = document.createElement('button'); btn.className = 'lang-btn';
        btn.innerHTML = label;
        btn.onclick = () => { currentLang = code; updateUI(); };
        container.appendChild(btn);
      }
    }
    function initTheme() {
      const stored = localStorage.getItem('theme');
      if (stored === 'light') { document.body.classList.remove('dark'); document.body.classList.add('light'); }
      else { document.body.classList.add('dark'); document.body.classList.remove('light'); }
      document.getElementById('theme-toggle').onclick = () => {
        const isDark = document.body.classList.contains('dark');
        if (isDark) { document.body.classList.replace('dark', 'light'); localStorage.setItem('theme', 'light'); }
        else { document.body.classList.replace('light', 'dark'); localStorage.setItem('theme', 'dark'); }
      };
    }
    function route() {
      const hash = window.location.hash.slice(1);
      if (hash && hash !== 'home' && spotsData.some(s => s.id === hash)) showDetailView(hash);
      else showHomeView();
    }
    window.addEventListener('popstate', () => {
      if (!document.getElementById('home-view').classList.contains('hidden')) {
        const id = window.location.hash.slice(1);
        if (id && spotsData.some(s=>s.id===id)) showDetailView(id);
        else showHomeView();
      } else { if (window.location.hash === '#home') showHomeView(); else route(); }
    });
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW error', e)));
    initLangButtons(); initTheme(); renderHome(); route();
    document.getElementById('settings-btn')?.addEventListener('click', openSettings);
    document.getElementById('save-settings')?.addEventListener('click', saveSettings);
    document.getElementById('close-settings')?.addEventListener('click', showHomeView);
  </script>
